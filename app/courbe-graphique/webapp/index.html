<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courbe de charge — Visualisation graphique</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
</head>
<body class="sapUiBody">

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.viz,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-resourceroots='{"onee.courbes.courbegraphique": "./"}'
  ></script>

  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(['sap/m/Shell', 'sap/ui/core/ComponentContainer'], function (Shell, ComponentContainer) {
        new Shell({
          appWidthLimited: false,
          app: new ComponentContainer({
            height: '100%',
            settings: { id: 'myApp' },
            componentName: 'onee.courbes.courbegraphique',
            async: true
          })
        }).placeAt('content');
      });
    });
  </script>

  <div id="content" style="height:100%;"></div>
</body>
</html>
