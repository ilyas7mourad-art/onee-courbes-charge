<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONEE – FIA Management</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #content    { height: 100%; }
  </style>

  <!--
    URL SANS version : sap.fe.* n'existe que sur le CDN public non-versionné.
    Toutes les URLs /1.120/, /1.132/, etc. retournent 404 pour sap.fe.core/templates.

    sap.fe.core DANS data-sap-ui-libs : sap/fe/core/routing/Router n'a pas de
    fichier .js standalone (404), mais il est inclus dans library-preload.js.
    Déclarer la lib ici force le chargement du preload complet avant l'init.

    attachInit : garantit que TOUS les preloads sont terminés avant de créer
    le ComponentContainer (sap.ui.require seul peut tirer trop tôt).
  -->
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ui.core,sap.fe.core,sap.fe.templates"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"onee.courbes.fiamanagement": "./"}'
  ></script>

  <script>
    sap.ui.getCore().attachInit(function () {
      "use strict";
      sap.ui.require(["sap/ui/core/ComponentContainer"], function (ComponentContainer) {
        new ComponentContainer({
          name  : "onee.courbes.fiamanagement",
          height: "100%",
          async : true
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody">
  <div id="content"></div>
</body>
</html>
