<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONEE – FIA Management</title>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ui.core,sap.fe.templates"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"onee.courbes.fiamanagement": "./"}'
  ></script>

  <script>
    sap.ui.require(
      ["sap/ui/core/ComponentContainer"],
      function (ComponentContainer) {
        new ComponentContainer({
          name    : "onee.courbes.fiamanagement",
          settings: { id: "onee.courbes.fiamanagement" },
          async   : true
        }).placeAt("content");
      }
    );
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
