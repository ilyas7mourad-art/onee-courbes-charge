<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONEE – Relevés courbes de charge</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #content    { height: 100%; }
  </style>
  <!-- Chart.js requis par l'ObjectPage (graphique courbe de charge) -->
  <!-- sap.viz non disponible sur le CDN public ui5.sap.com -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
  <!-- Chart.js — requis par la section "Courbe de charge" de l'ObjectPage -->
  <!-- sap.viz non disponible sur le CDN public ui5.sap.com -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ui.core,sap.fe.core,sap.fe.templates"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"onee.courbes.courbesdisplay": "./"}'
  ></script>
  <script>
    sap.ui.getCore().attachInit(function () {
      "use strict";
      sap.ui.require(["sap/ui/core/ComponentContainer"], function (ComponentContainer) {
        new ComponentContainer({
          name  : "onee.courbes.courbesdisplay",
          height: "100%",
          async : true
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody">
  <div id="content"></div>
</body>
</html>
